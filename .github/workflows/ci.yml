name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  license-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no proprietary code in OCCT tree
        run: |
          if grep -r "Fintel IT Solutions" third-party/occt/ 2>/dev/null; then
            echo "ERROR: Proprietary code found in OCCT source tree"
            exit 1
          fi
          echo "OCCT boundary check passed"
